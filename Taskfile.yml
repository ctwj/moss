# https://taskfile.dev

version: '3'

tasks:
  
  run:
    desc: "启动后端服务（无热重载）"
    cmds:
      - cd ./main/tmp && go run ../cmd/web/main.go
    silent: true

  admin:
    desc: "启动前端开发服务器"
    cmds:
      - cd ./admin && npm run dev

  dev:
    desc: "启动完整开发环境（前后端热重载）"
    deps:
      - dev-message
      - dev-backend
      - dev-frontend

  dev-message:
    desc: "显示开发环境信息"
    cmds:
      - echo "🚀 启动 Moss 完整开发环境..."
      - echo "🔧 后端 (Go) - http://localhost:9008"
      - echo "🎨 前端 (Vue) - http://localhost:3000/admin/"
      - echo "🌐 网站前台 - http://moss.l9.lc/"
      - echo "📊 管理后台 - http://moss.l9.lc/admin"
      - echo "📝 查看日志 - task logs"
    silent: true

  dev-backend:
    desc: "启动后端热重载开发服务器"
    cmds:
      - cd ./main && air
    silent: false
    background: true

  dev-frontend:
    desc: "启动前端开发服务器"
    cmds:
      - cd ./admin && npm run dev
    silent: false
    background: true

  logs:
    desc: "查看开发日志"
    cmds:
      - echo "=== Nginx 访问日志 (最近10行) ==="
      - tail -10 /www/wwwlogs/moss.l9.lc.log 2>/dev/null || echo "日志文件不存在"
      - echo ""
      - echo "=== Nginx 错误日志 (最近10行) ==="
      - tail -10 /www/wwwlogs/moss.l9.lc.error.log 2>/dev/null || echo "错误日志文件不存在"

  logs-tail:
    desc: "实时查看Nginx日志"
    cmds:
      - echo "正在实时查看Nginx日志，按Ctrl+C退出..."
      - tail -f /www/wwwlogs/moss.l9.lc.log

  status:
    desc: "检查开发环境状态"
    cmds:
      - echo "=== 进程状态 ==="
      - ps aux | grep -E "(air|vite|moss|node.*3000)" | grep -v grep || echo "未找到相关进程"
      - echo ""
      - echo "=== 端口监听 ==="
      - ss -tlnp | grep -E ':(3000|9008|80)' || echo "端口未监听"
      - echo ""
      - echo "=== API 健康检查 ==="
      - curl -s http://localhost:9008/admin/api/admin/exists 2>/dev/null | head -1 || echo "API不可访问"
      - echo ""
      - echo "=== 前端健康检查 ==="
      - curl -s -I http://localhost:3000/admin/ 2>/dev/null | head -1 || echo "前端不可访问"

  restart-nginx:
    desc: "重载Nginx配置"
    cmds:
      - nginx -t && systemctl reload nginx
      - echo "✅ Nginx配置已重载"

  reset-admin:
    desc: "重置管理员账户（10分钟内有效）"
    cmds:
      - pkill moss 2>/dev/null || true
      - sleep 1
      - cd ./main && ./moss --username="admin" --password="admin123" &
      - echo "✅ 管理员已重置"
      - echo "   用户名 - admin"
      - echo "   密码 - admin123"
      - echo "⚠️  请在10分钟内使用此账户登录"


  #############
  ### init ###
  #############

  init-admin:
    desc: "初始化前端依赖"
    cmds:
      - cd ./admin && npm install

  init-themes:
    desc: "初始化主题依赖"
    cmds:
      - cd ./theme/germ && npm install

  
  ### 开发默认模板时，更新模板到资源文件
  init-resources-themes:
    desc: "更新主题到资源文件"
    cmds:
      - cd ./theme/germ && npx tailwindcss -i ./css/style.css -o ../../main/tmp/themes/germ/public/style.css --minify
      - rm -r -f ./main/resources/themes
      - cp -r ./main/tmp/themes ./main/resources/themes


  #############
  ### build ###
  #############

  build:
    desc: "构建生产版本 (前端 + Linux AMD64)"
    cmds:
      - task: build-admin
      - task: build-linux-amd64

  build-all:
    desc: "构建所有平台版本"
    cmds:
      - task: build-admin
      - task: build-main

  build-admin:
    desc: "构建前端"
    cmds:
      - cd ./admin && npm run build

  build-main:
    desc: "构建后端 (所有平台)"
    cmds:
      - task: build-linux-386
      - task: build-linux-amd64
      - task: build-windows-amd64
      - task: build-darwin-amd64
      - task: build-darwin-arm64

  build-linux-386:
    desc: "构建 Linux 386"
    vars:
      GOOS: linux
      GOARCH: 386
      FILE_EXT: ""
    cmds:
      - task: _build
        vars: {GOOS: linux, GOARCH: 386, FILE_EXT: ""}

  build-linux-amd64:
    desc: "构建 Linux AMD64"
    vars:
      GOOS: linux
      GOARCH: amd64
      FILE_EXT: ""
    cmds:
      - task: _build
        vars: {GOOS: linux, GOARCH: amd64, FILE_EXT: ""}

  build-windows-386:
    desc: "构建 Windows 386"
    vars:
      GOOS: windows
      GOARCH: 386
      FILE_EXT: .exe
    cmds:
      - task: _build
        vars: {GOOS: windows, GOARCH: 386, FILE_EXT: .exe}

  build-windows-amd64:
    desc: "构建 Windows AMD64"
    vars:
      GOOS: windows
      GOARCH: amd64
      FILE_EXT: .exe
    cmds:
      - task: _build
        vars: {GOOS: windows, GOARCH: amd64, FILE_EXT: .exe}

  build-darwin-amd64:
    desc: "构建 macOS AMD64"
    vars:
      GOOS: darwin
      GOARCH: amd64
      FILE_EXT: ""
    cmds:
      - task: _build
        vars: {GOOS: darwin, GOARCH: amd64, FILE_EXT: ""}

  build-darwin-arm64:
    desc: "构建 macOS ARM64"
    vars:
      GOOS: darwin
      GOARCH: arm64
      FILE_EXT: ""
    cmds:
      - task: _build
        vars: {GOOS: darwin, GOARCH: arm64, FILE_EXT: ""}

  ######
  ######
  _build:
    desc: "内部构建任务"
    vars:
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
      FILE_EXT: '{{.FILE_EXT}}'
    env:
      CGO_ENABLED: 0
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    cmds:
      - |
        FILE_NAME="moss_{{.GOOS}}_{{.GOARCH}}{{.FILE_EXT}}"
        BUILD_FILE_PATH="{{.ROOT_DIR}}/dist/$FILE_NAME"
        BACKUP_FILE_PATH="{{.ROOT_DIR}}/dist/backup/${FILE_NAME}_$(date +"%Y.%m.%d.%H.%M.%S")"
        test -f "$BUILD_FILE_PATH" && mkdir -p './dist/backup' && mv "$BUILD_FILE_PATH" "$BACKUP_FILE_PATH" || true
        cd ./main && go build -ldflags="-s -w" -trimpath -o "$BUILD_FILE_PATH" ./cmd/web/main.go
        which upx >/dev/null 2>&1 && upx -4 "$BUILD_FILE_PATH" || echo "upx not found, skipping compression"
    ignore_error: true
      