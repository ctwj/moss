# https://taskfile.dev

version: '3'

tasks:
  
  run:
    desc: "启动后端服务（无热重载）"
    cmds:
      - cd ./main/tmp && go run ../cmd/web/main.go
    silent: true

  admin:
    desc: "启动前端开发服务器"
    cmds:
      - cd ./admin && npm run dev

  dev:
    desc: "启动完整开发环境（前后端热重载）"
    cmds:
      - echo "🚀 启动 Moss 完整开发环境..."
      - echo "🔧 后端 (Go): http://localhost:9008"
      - echo "🎨 前端 (Vue): http://localhost:3000/admin/"
      - echo "🌐 网站前台: http://moss.l9.lc/"
      - echo "📊 管理后台: http://moss.l9.lc/admin"
      - echo "📝 查看日志: task logs"
      - task: dev-backend
      - task: dev-frontend

  dev-backend:
    desc: "启动后端热重载开发服务器"
    cmds:
      - cd ./main && air
    silent: false
    background: true

  dev-frontend:
    desc: "启动前端开发服务器"
    cmds:
      - cd ./admin && npm run dev
    silent: false
    background: true

  logs:
    desc: "查看开发日志"
    cmds:
      - echo "=== Nginx 访问日志 (最近10行) ==="
      - tail -10 /www/wwwlogs/moss.l9.lc.log 2>/dev/null || echo "日志文件不存在"
      - echo ""
      - echo "=== Nginx 错误日志 (最近10行) ==="
      - tail -10 /www/wwwlogs/moss.l9.lc.error.log 2>/dev/null || echo "错误日志文件不存在"

  logs-tail:
    desc: "实时查看Nginx日志"
    cmds:
      - echo "正在实时查看Nginx日志，按Ctrl+C退出..."
      - tail -f /www/wwwlogs/moss.l9.lc.log

  status:
    desc: "检查开发环境状态"
    cmds:
      - echo "=== 进程状态 ==="
      - ps aux | grep -E "(air|vite|moss|node.*3000)" | grep -v grep || echo "未找到相关进程"
      - echo ""
      - echo "=== 端口监听 ==="
      - ss -tlnp | grep -E ':(3000|9008|80)' || echo "端口未监听"
      - echo ""
      - echo "=== API 健康检查 ==="
      - curl -s http://localhost:9008/admin/api/admin/exists 2>/dev/null | head -1 || echo "API不可访问"
      - echo ""
      - echo "=== 前端健康检查 ==="
      - curl -s -I http://localhost:3000/admin/ 2>/dev/null | head -1 || echo "前端不可访问"

  restart-nginx:
    desc: "重载Nginx配置"
    cmds:
      - nginx -t && systemctl reload nginx
      - echo "✅ Nginx配置已重载"

  reset-admin:
    desc: "重置管理员账户（10分钟内有效）"
    cmds:
      - pkill moss 2>/dev/null || true
      - sleep 1
      - cd ./main && ./moss --username="admin" --password="admin123" &
      - echo "✅ 管理员已重置"
      - echo "   用户名: admin"
      - echo "   密码: admin123"
      - echo "⚠️  请在10分钟内使用此账户登录"


  #############
  ### init ###
  #############

  init-admin:
    cmds:
      - cd ./admin && npm install

  init-themes:
    cmds:
      - cd ./theme/germ && npm install

  
  ### 开发默认模板时，更新模板到资源文件
  init-resources-themes:
    cmds:
      - cd ./theme/germ && npx tailwindcss -i ./css/style.css -o ../../main/tmp/themes/germ/public/style.css --minify
      - rm -r -f ./main/resources/themes
      - cp -r ./main/tmp/themes ./main/resources/themes


  #############
  ### build ###
  #############

  build:
    - task: build-admin
    - task: build-linux-amd64

  build-all:
    - task: build-admin
    - task: build-main

  build-admin:
    cmds:
      - cd ./admin && npm run build

  build-main:
    deps: [
      build-linux-386,
      build-linux-amd64,
      #build-windows-386,
      build-windows-amd64,
      build-darwin-amd64,
      build-darwin-arm64,
    ]

  build-linux-386:
    - task: _build
      vars:
        GOOS: linux
        GOARCH: 386

  build-linux-amd64:
    - task: _build
      vars:
        GOOS: linux
        GOARCH: amd64

  build-windows-386:
    - task: _build
      vars:
        GOOS: windows
        GOARCH: 386
        FILE_EXT: .exe


  build-windows-amd64:
    - task: _build
      vars:
        GOOS: windows
        GOARCH: amd64
        FILE_EXT: .exe


  build-darwin-amd64:
    - task: _build
      vars:
        GOOS: darwin
        GOARCH: amd64

  build-darwin-arm64:
    - task: _build
      vars:
        GOOS: darwin
        GOARCH: arm64

  ######
  ######
  _build:
    vars:
      FILE_NAME: 'moss_{{.GOOS}}_{{.GOARCH}}{{.FILE_EXT}}'
      BUILD_FILE_PATH: '{{.ROOT_DIR}}/dist/{{.FILE_NAME}}'
      BACKUP_FILE_PATH: '{{.ROOT_DIR}}/dist/backup/{{.FILE_NAME}}_{{now | date "2006.01.02.15.04.05"}}'
    env:
      CGO_ENABLED: 0
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    cmds:
      - mkdir -p './dist/backup' && mv "{{.BUILD_FILE_PATH}}" "{{.BACKUP_FILE_PATH}}"
      - cd ./main && go build -ldflags="-s -w" -trimpath -o "{{.BUILD_FILE_PATH}}" ./cmd/web/main.go
      - upx -4 "{{.BUILD_FILE_PATH}}"
    ignore_error: true
      