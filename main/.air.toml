# Air configuration for Moss CMS backend
# Run with: air

[build]
# Command to build the project
cmd = "go build -o ./tmp/main ./cmd/web/main.go"
# Binary output path
bin = "./tmp/main"
# Watch these file extensions
include_ext = ["go", "tpl", "tmpl", "html", "toml"]
# Exclude these directories
exclude_dir = ["assets", "tmp", "vendor", "testdata", "logs", ".git"]
# Include these directories (empty means all)
include_dir = []
# Exclude files matching these regex patterns
exclude_regex = ["_test\\.go", "_mock\\.go"]
# Don't restart if no changes (useful for log spam)
exclude_unchanged = false
# Follow symbolic links
follow_symlink = false
# Log file for build errors
log = "logs/air-build-errors.log"
# Use polling instead of filesystem events (useful in some Docker/virtual environments)
poll = false
poll_interval = 1000
# Delay after change before restart (ms)
delay = 1000
# Stop on build error
stop_on_error = true
# Send interrupt signal before killing
send_interrupt = false
# Delay before force kill (ms)
kill_delay = 500

[log]
# Show timestamp in logs
time = true
# Only show main process logs
main_only = false

[color]
# Terminal colors
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Clean tmp directory on exit
clean_on_exit = true
# Show full output
full_bin_output = false

[screen]
# Clear screen on rebuild
clear_on_rebuild = true